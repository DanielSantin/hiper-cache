<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .5px;
      color: #f1f5f9;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: #64748b;
      margin-bottom: 4px;
    }

    .value {
      font-size: 22px;
      font-weight: 700;
      color: #38bdf8;
    }

    .value-sm {
      font-size: 18px;
      font-weight: 700;
      color: #a78bfa;
    }

    .sub {
      font-size: 10px;
      color: #475569;
      margin-top: 2px;
    }

    button {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      margin-bottom: 6px;
    }

    .btn-export { background: #1a7a1a; }
    .btn-export:hover { background: #156015; }

    .btn-clear { background: #ef4444; }
    .btn-clear:hover { background: #dc2626; }

    /* Config orçamento */
    .orc-config { display: flex; flex-direction: column; gap: 8px; }

    .orc-row { display: flex; align-items: center; gap: 6px; }

    .orc-row label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: #64748b;
      width: 62px;
      flex-shrink: 0;
    }

    select.orc-select {
      flex: 0 0 52px;
      padding: 4px 6px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 5px;
      color: #e2e8f0;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    input.orc-num {
      flex: 1;
      padding: 4px 8px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 5px;
      color: #e2e8f0;
      font-size: 13px;
      font-weight: 700;
      min-width: 0;
    }

    input.orc-num:focus, select.orc-select:focus {
      outline: none;
      border-color: #38bdf8;
    }

    .orc-preview {
      font-size: 11px;
      color: #38bdf8;
      letter-spacing: .5px;
      text-align: right;
    }

    .btn-orc-save {
      width: 100%;
      padding: 6px;
      border: none;
      border-radius: 5px;
      background: #1e4a7a;
      color: #93c5fd;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      margin: 0;
    }
    .btn-orc-save:hover { background: #1d4ed8; color: #fff; }

    .feedback {
      font-size: 11px;
      color: #22c55e;
      text-align: center;
      margin-top: 4px;
      min-height: 16px;
    }

    /* Toggle */
    .toggle-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
    }

    .toggle-label { position: relative; display: inline-block; width: 40px; height: 22px; margin: 0; }
    .toggle-label input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute; cursor: pointer; inset: 0;
      background: #ef4444; border-radius: 22px; transition: .2s;
    }

    .thumb {
      position: absolute; height: 16px; width: 16px;
      left: 3px; bottom: 3px; background: #fff;
      border-radius: 50%; transition: .2s; pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot" id="dot"></div>
    <h1>Hiper Cache · Produtos</h1>
  </div>

  <div class="card toggle-wrap">
    <div>
      <div class="label" style="margin-bottom:0">Extensão ativa</div>
      <div class="sub">Desativar pausa todos os módulos</div>
    </div>
    <label class="toggle-label">
      <input type="checkbox" id="toggleAtivo">
      <span class="slider" id="toggleSlider"></span>
      <span class="thumb" id="toggleThumb"></span>
    </label>
  </div>

  <div class="card">
    <div class="label">Entradas em cache</div>
    <div class="value" id="count">—</div>
    <div class="sub">TTL: 1 hora por entrada</div>
  </div>

  <div class="card">
    <div class="label">Custos salvos</div>
    <div class="value-sm" id="custoCount">—</div>
    <div class="sub">Persistem entre sessões</div>
  </div>

  <div class="card">
    <div class="label" style="margin-bottom:8px">Numeração de orçamentos</div>
    <div class="orc-config">
      <div class="orc-row">
        <label>Letra</label>
        <select id="orcLetra" class="orc-select">
          <!-- A–Z -->
          <option>A</option><option>B</option><option>C</option><option>D</option>
          <option>E</option><option>F</option><option>G</option><option>H</option>
          <option>I</option><option>J</option><option>K</option><option>L</option>
          <option>M</option><option>N</option><option>O</option><option>P</option>
          <option>Q</option><option>R</option><option>S</option><option>T</option>
          <option>U</option><option>V</option><option>W</option><option>X</option>
          <option>Y</option><option>Z</option>
        </select>
      </div>
      <div class="orc-row">
        <label>Contador</label>
        <input id="orcCounter" class="orc-num" type="number" min="999" max="99999" step="1" placeholder="999" />
      </div>
      <div class="orc-preview" id="orcPreview">Próximo: —</div>
      <button class="btn-orc-save" id="orcSaveBtn">💾 Salvar configuração</button>
    </div>
  </div>

  <button class="btn-export" id="exportBtn">⬇️ Exportar custos (JSON)</button>
  <button class="btn-clear" id="clearBtn">🗑 Limpar cache agora</button>
  <div class="feedback" id="feedback"></div>

  <script src="popup.js"></script>
</body>
</html>
